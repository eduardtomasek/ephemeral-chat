services:
  app:
    environment:
      TRUST_PROXY: "true"

  caddy-http:
    image: caddy:2
    profiles:
      - http-proxy
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile.http:/etc/caddy/Caddyfile:ro

  caddy-https:
    image: caddy:2
    profiles:
      - https-proxy
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8443:443"
    environment:
      CADDY_HTTPS_HOST: ${CADDY_HTTPS_HOST:-localhost}
    volumes:
      - ./Caddyfile.https:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
